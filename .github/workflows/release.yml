name: Release

# Tag a version to build the installer and publish a GitHub Release:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  installer:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/chamber/pnpm-lock.yaml
      - name: Install frontend deps
        working-directory: apps/chamber
        run: pnpm install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build app + NSIS installer
        working-directory: apps/chamber
        run: pnpm tauri build

      # The bundle lands in the shared workspace target dir, not under apps/chamber.
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            target/release/bundle/nsis/*-setup.exe
